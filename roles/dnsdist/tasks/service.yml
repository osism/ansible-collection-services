---
- name: Copy docker-compose.yml file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ dnsdist_docker_compose_directory }}/docker-compose.yml"
    owner: "{{ operator_user }}"
    group: "{{ operator_group }}"
    mode: 0640
  notify: Restart dnsdist service

- name: Manage dnsdist service
  become: true
  ansible.builtin.systemd_service:
    name: "{{ dnsdist_service_name }}"
    state: started
    enabled: true

- name: Wait until dnsdist service is active
  become: true
  ansible.builtin.command:
    cmd: "systemctl is-active {{ dnsdist_service_name }}"
  register: _dnsdist_is_active
  changed_when: false
  failed_when: false
  until: _dnsdist_is_active.stdout | trim == "active"
  retries: 10
  delay: 20
