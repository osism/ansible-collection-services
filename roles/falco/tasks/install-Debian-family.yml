---
- name: Remove old architecture-dependent repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [ arch=amd64 ] https://download.falco.org/packages/deb stable main"
    state: absent
    filename: falco
  when: falco_configure_repository|bool

- name: Install apt-transport-https package
  become: true
  ansible.builtin.apt:
    name: apt-transport-https
    state: present
    lock_timeout: "{{ apt_lock_timeout | default(300) }}"
  when: falco_configure_repository|bool
  changed_when: false

- name: Add repository gpg key
  become: true
  ansible.builtin.get_url:
    url: "{{ falco_repository_key }}"
    dest: /etc/apt/trusted.gpg.d/falco.asc
    mode: 0644
    owner: root
    group: root
  when:
    - falco_configure_repository|bool

- name: Add repository
  become: true
  ansible.builtin.apt_repository:
    repo: "{{ falco_debian_repository }}"
    state: present
    filename: falco
    update_cache: true
  when: falco_configure_repository|bool

- name: "Install package {{ falco_package_name }}"
  become: true
  ansible.builtin.apt:
    name: "{{ falco_package_name }}"
    state: latest
    lock_timeout: "{{ apt_lock_timeout | default(300) }}"
  notify: "Restart service {{ falco_service_name }}"

# No kernel module is built or loaded here: the role runs
# falco-modern-bpf.service, which uses the modern eBPF probe (CO-RE, shipped in
# the falco package) and needs no driver build. The previous kmod workflow
# (falcoctl driver config/install, .ko symlink, modules-load.d, modprobe) was
# left over from the pre-#1749 falco-kmod service and only broke installs:
# falcoctl driver install fails on any Debian host lacking a prebuilt .ko and
# without dkms to compile one.

- name: "Manage service {{ falco_service_name }}"
  become: true
  ansible.builtin.service:
    name: "{{ falco_service_name }}"
    state: started
    enabled: true
