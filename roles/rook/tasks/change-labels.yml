#  loop: "{{ query('vars', *list_rook_placement_label_names) }}"

- name: end
  meta: end_play

- name: Create patched labels
  vars:
    prefix: node-role.osism.tech/
    # find all variables matching the regular expression
    list_rook_placement_label_names: "{{ query('varnames', '^rook_placement_label_') }}"
    # prefix all values of prior gathered variables in new list
    list_rook_placement_labels: "{{ [prefix] | product(query('vars', *list_rook_placement_label_names)) | map('join') | list }}"
  ansible.builtin.set_fact:
    dict_node_name_patched_labels: "{{ dict_node_name_patched_labels | default({}) | combine({item.metadata.name: (item.metadata.labels | dict2items | rejectattr('key', 'in', list_rook_placement_labels) | items2dict)}) }}"
  loop: "{{ node_list.resources }}"

- name: Apply patched labels to nodes
  kubernetes.core.k8s:
    state: patched
    definition:
      apiVersion: v1
      kind: Node
      metadata:
        name: "{{ item.key }}"
        labels: "{{ item.value }}"
  loop: "{{ lookup('ansible.builtin.dict', dict_node_name_patched_labels) }}"
