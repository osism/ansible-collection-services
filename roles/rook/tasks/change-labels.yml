- name: Prepare list of label names
  ansible.builtin.set_fact:
    # find all variables matching the regular expression
    list_rook_placement_label_names: "{{ query('varnames', '^rook_placement_label_') }}"    

- name: Prepare
  ansible.builtin.set_fact:
    list_interim_node_new_labels: "{{ list_node_new_labels | default([]) + (groups[item] | product([item])) }}"
  loop: "{{ query('vars', *list_rook_placement_label_names) }}"

- name: test prepare
  debug:
    msg: "{{ list_interim_node_new_labels }}"

- name: prepare further
  ansible.builtin.set_fact:
    list_node_new_labels: "{{ list_node_new_labels | default([]) + [{item[0].split('.')[0]: item[1]}] }}"
  loop: "{{ list_interim_node_new_labels }}"

- name: test prepare further
  debug:
    msg: "{{ list_node_new_labels }}"

- name: generate what to remove
  ansible.builtin.set_fact:
    to_remove: "{{ to_remove | default({}) | combine(query('dict', )) }}"
  loop: "{{ list_interim_node_new_labels }}"

- name: bla
  ansible.builtin.set_fact:
    d: "{{ d | default([]) + [{'key': item, 'value': groups[item]}] }}"
  loop: "{{ query('vars', *list_rook_placement_label_names) }}"

- name: test bla
  debug:
    msg: "{{ d }}"

- name: bla2
  ansible.builtin.set_fact:
    d2: "{{ d2 | default({}) | combine({'key': groups[item], 'value': item}) }}"
  loop: "{{ query('vars', *list_rook_placement_label_names) }}"

- name: test bla2
  debug:
    msg: "{{ d2 }}"

