---
- name: Restart substation service
  become: true
  ansible.builtin.systemd_service:
    name: "{{ substation_service_name }}"
    state: restarted
  notify:
    - Wait until substation service is active

- name: Wait until substation service is active
  become: true
  ansible.builtin.command:
    cmd: "systemctl is-active {{ substation_service_name }}"
  register: _substation_is_active
  changed_when: false
  failed_when: false
  until: _substation_is_active.stdout | trim == "active"
  retries: 10
  delay: 20
  notify:
    - Ensure that all containers are up

- name: Ensure that all containers are up
  ansible.builtin.command:
    cmd: docker compose --project-directory /opt/substation up -d
  changed_when: true
  notify:
    - Wait for an healthy service

# NOTE: The command returns a list of IDs of containers from the service
#       that are currently starting or unhealthy. As long as the list is not empty
#       the service is not in a good state.
- name: Wait for an healthy service
  ansible.builtin.shell: |
    set -o pipefail
    docker compose --project-directory /opt/substation \
        ps --all --format json | \
        jq '. | select(.State=="created" or .State=="exited" or .Health=="starting" or .Health=="unhealthy") | .Name'
  args:
    executable: /bin/bash
  register: result
  until: "result.stdout | length == 0"
  retries: 20
  delay: 10
  changed_when: true
