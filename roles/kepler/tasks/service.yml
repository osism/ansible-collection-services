---
- name: Copy docker-compose.yml file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ kepler_docker_compose_directory }}/docker-compose.yml"
    owner: "{{ operator_user }}"
    group: "{{ operator_group }}"
    mode: 0640
  notify: Restart kepler service

- name: Manage kepler service
  become: true
  ansible.builtin.systemd_service:
    name: "{{ kepler_service_name }}"
    state: started
    enabled: true

- name: Wait until kepler service is active
  become: true
  ansible.builtin.command:
    cmd: "systemctl is-active {{ kepler_service_name }}"
  register: _kepler_is_active
  changed_when: false
  failed_when: false
  until: _kepler_is_active.stdout | trim == "active"
  retries: 10
  delay: 20
