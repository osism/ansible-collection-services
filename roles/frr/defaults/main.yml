---
frr_package_name: frr
frr_service_name: frr

frr_version: "8.1"

frr_sysctl_defaults:
  - name: net.ipv4.ip_forward
    value: 1
  - name: net.ipv4.conf.all.send_redirects
    value: 0
  - name: net.ipv4.conf.all.accept_redirects
    value: 0
  - name: net.ipv4.fib_multipath_hash_policy
    value: 1
  - name: net.ipv4.conf.default.ignore_routes_with_linkdown
    value: 1
  - name: net.ipv4.conf.all.rp_filter
    value: 2
frr_sysctl_extra: []
frr_sysctl: "{{ frr_sysctl_defaults + frr_sysctl_extra }}"

frr_uplinks: []
frr_uplinks_groups:
  - generic

frr_dummy_interface: dummy0
frr_hostname: "{{ hostname_name | default(inventory_hostname_short) }}"
frr_local_as: 4200000000
# TODO(frickler): remove old var after deprecation
frr_loopback_interface: "{{ frr_dummy_interface | default('loopback0') }}"
frr_type: leaf
frr_loopback_v4: 127.0.0.42
frr_loopback_v6: 2001:db8:cafe:f00d::42

frr_externalbackup_v4: []
frr_externalbackup_v6: []
frr_internalbackup_v4: []
frr_internalbackup_v6: []

frr_extra_interfaces: []

# VRRP configuration
# Example:
# frr_vrrp_groups:
#   - interface: eth0
#     id: 10
#     priority: 100  # optional, default 100
#     preempt: true  # optional, default true
#     ipv4:
#       - 192.168.1.1
#       - 192.168.1.2
#     ipv6:  # optional
#       - 2001:db8::1
frr_vrrp_groups: []

frr_incoming_table_external: 254

frr_local_pref:
  - 1000

frr_enable_bgpd: "yes"
frr_enable_bfdd: "no"
frr_enable_ospfd: "no"
frr_enable_ospf6d: "no"
frr_enable_vrrpd: "no"

frr_options_bgpd: "-A 127.0.0.1"
frr_options_bfdd: "-A 127.0.0.1"
frr_options_ospfd: "-A 127.0.0.1"
frr_options_ospf6d: "-A ::1"
frr_options_vrrpd: "-A 127.0.0.1"

# Set frr_config_template to provide the complete FRR configuration
# as a Jinja2 template from a variable (e.g. injected via Netbox config context).
# When defined, this takes precedence over all other configuration sources.
# frr_config_template:

frr_config_file: "/etc/frr/frr.conf"
frr_vtysh_file: "/etc/frr/vtysh.conf"
frr_daemons_file: "/etc/frr/daemons"

frr_allow_service_restart: true

# YRZN Metalbox configuration
frr_yrzn_metalbox_bmc_loopback: loopback0
frr_yrzn_metalbox_bmc_peer_group: bmc-switches
frr_yrzn_metalbox_data_loopback: loopback1
frr_yrzn_metalbox_data_peer_group: data-switches
frr_yrzn_metalbox_timers_connect: 30
frr_yrzn_metalbox_timers_keepalive: 3
frr_yrzn_metalbox_timers_holdtime: 9
frr_yrzn_metalbox_maximum_paths: 2

# YRZN Network configuration
frr_yrzn_network_data_loopback: loopback0
frr_yrzn_network_data_peer_group: data-switches
frr_yrzn_network_provider_loopback: loopback1
frr_yrzn_network_provider_peer_group: provider-switches
frr_yrzn_network_timers_connect: 30
frr_yrzn_network_timers_keepalive: 3
frr_yrzn_network_timers_holdtime: 9
frr_yrzn_network_maximum_paths: 2
frr_yrzn_network_announced_networks: []
