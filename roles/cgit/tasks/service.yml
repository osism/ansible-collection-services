---
- name: Create traefik external network
  community.docker.docker_network:
    name: "{{ traefik_external_network_name }}"
    ipam_config:
      - subnet: "{{ traefik_external_network_cidr }}"
  when: cgit_traefik|bool

- name: Copy docker-compose.yml file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ cgit_docker_compose_directory }}/docker-compose.yml"
    owner: "{{ operator_user }}"
    group: "{{ operator_group }}"
    mode: 0640
  notify: Restart cgit service

- name: Manage cgit service
  become: true
  ansible.builtin.systemd_service:
    name: "{{ cgit_service_name }}"
    state: started
    enabled: true

- name: Wait until cgit service is active
  become: true
  ansible.builtin.command:
    cmd: "systemctl is-active {{ cgit_service_name }}"
  register: _cgit_is_active
  changed_when: false
  failed_when: false
  until: _cgit_is_active.stdout | trim == "active"
  retries: 10
  delay: 20
